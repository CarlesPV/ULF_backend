name: Deploy Backend

on:
  push:
    branches:
      - master

env:
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
  FIREBASE_DATABASE_URL: https://unilost-and-found-default-rtdb.europe-west1.firebasedatabase.app

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Deploy Firebase
        uses: w9jds/firebase-action@v15.11.0
        with:
          args: deploy --project unilost-and-found --only database
        env:
          GCP_SA_KEY: ${{ env.FIREBASE_SERVICE_ACCOUNT }}

  seed-database:
    runs-on: ubuntu-latest
    needs: deploy-database
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
      - name: Install dependencies
        run: pip install firebase-admin
      - name: Run seed
        run: python src/scripts/seed_db.py
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ env.FIREBASE_DATABASE_URL }}